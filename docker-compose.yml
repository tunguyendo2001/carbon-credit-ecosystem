version: '3.8'

services:
  # TAB 3: GANACHE
  ganache:
    image: node:18-alpine
    container_name: cce-ganache
    network_mode: "host"
    working_dir: /app
    command: sh -c "npm install -g ganache && ganache -d --host 0.0.0.0 --port 8545 --chain.networkId 5777"

  # MONGODB
  mongodb:
    image: mongo:latest
    container_name: cce-mongodb
    network_mode: "host"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
      - MONGO_INITDB_DATABASE=off-chain-db

  mongodb-ui:
    image: mongo-express:latest
    container_name: cce-mongodb-ui
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin
      - ME_CONFIG_MONGODB_SERVER=localhost
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    network_mode: "host"

  # TAB 1: PYTHON BACKEND
  python-backend:
    image: python:3.9-slim
    container_name: cce-python
    network_mode: "host"
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install flask sentinelhub numpy flask_cors python-dotenv && python app.py"

  # TAB 2: NODE.JS BACKEND
  node-backend:
    image: node:18-alpine
    container_name: cce-node
    network_mode: "host"
    working_dir: /app
    environment:
      - MONGO_URI=mongodb://admin:admin@localhost:27017/off-chain-db?authSource=admin
      - PORT=8000
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - ganache
    command: sh -c "npm install && npm start"

  # TAB 4: FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx
    container_name: cce-frontend
    network_mode: "host"
    depends_on:
      - node-backend

  # TAB 5 & 6: DEMO RUNNER
  demo-runner:
    image: node:18-alpine
    container_name: cce-demo-runner
    network_mode: "host"
    working_dir: /app
    profiles: ["demo"]
    environment:
      - BLOCKCHAIN_HOST=localhost
    volumes:
      - ./:/app
    depends_on:
      - ganache
    command: >
      sh -c "npm install -g truffle@5.11.5 && 
             rm -rf build && 
             truffle compile --all && 
             truffle migrate --reset --network development && 
             truffle exec scripts/demo_data_flow.js --network development"
  
