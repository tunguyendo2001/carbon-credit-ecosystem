server {
    listen 80;
    server_name localhost;

    # Portal cho Generator
    location /generator {
        alias /usr/share/nginx/html/generator/;
        try_files $uri $uri/ /generator/index.html;
    }

    # Portal cho Consumer
    location /consumer {
        alias /usr/share/nginx/html/consumer/;
        try_files $uri $uri/ /consumer/index.html;
    }

    # Portal cho Validator 1
    location /validator1 {
        alias /usr/share/nginx/html/validator1/;
        try_files $uri $uri/ /validator1/index.html;
    }

    # Portal cho Validator 2
    location /validator2 {
        alias /usr/share/nginx/html/validator2/;
        try_files $uri $uri/ /validator2/index.html;
    }

    # Proxy các yêu cầu API về Backend
    location /api {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
